name: "Release"

on:
  release:
    types: [published]

jobs:
  binaries:
    name: Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - arch: x86_64
            pkg: plundrio
            suffix: x86_64-linux
          - arch: aarch64
            pkg: plundrio-aarch64
            suffix: aarch64-linux
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main

      - name: Build ${{ matrix.arch }} binary
        run: nix build .#${{ matrix.pkg }}

      - name: Upload ${{ matrix.arch }} binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./result/bin/plundrio
          asset_name: plundrio_${{ github.event.release.tag_name }}.${{ matrix.suffix }}
          asset_content_type: application/octet-stream

  docker:
    name: Push Docker Image (${{ matrix.docker_arch_suffix }})
    needs: [binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - nix_package: plundrio-docker
            docker_arch_suffix: amd64
          - nix_package: plundrio-docker-aarch64
            docker_arch_suffix: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main
        with:
          fail-mode: true

      - name: Build Docker image with Nix
        run: nix build .#${{ matrix.nix_package }}

      - name: Push image with skopeo
        env:
          ARCH: ${{ matrix.docker_arch_suffix }}
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          skopeo login ghcr.io -u ${{ github.actor }} --password "${{ secrets.GITHUB_TOKEN }}"
          for TAG in "${IMAGE}:${VERSION}-${ARCH}" "${IMAGE}:latest-${ARCH}"; do
            echo "Pushing $TAG"
            skopeo copy "docker-archive:$(readlink -f result)" "docker://${TAG}"
          done

  create_manifest:
    name: Create Multi-Arch Manifests
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Create Manifest and Push
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          for TAG in "${IMAGE}:${VERSION}" "${IMAGE}:latest"; do
            echo "Creating manifest for $TAG"
            docker manifest create "$TAG" \
              "${TAG}-amd64" \
              "${TAG}-arm64"
            docker manifest push "$TAG"
          done
